name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-format:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run ESLint
      run: npm run lint
      
    - name: Check Prettier formatting
      run: npm run format:check
      
    - name: Validate TypeScript
      run: npx tsc --noEmit

  test-android:
    name: Android Tests
    runs-on: ubuntu-latest
    needs: lint-and-format
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Install dependencies
      run: npm ci
      
    - name: Install Appium
      run: npm install -g appium
      
    - name: Install Appium drivers
      run: |
        appium driver install uiautomator2
        appium driver list --installed
        
    - name: Setup Android Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        target: default
        arch: x86_64
        profile: Nexus 6
        script: echo "Emulator started"
        
    - name: Create test React Native app (mock)
      run: |
        mkdir -p test-app/android/app/build/outputs/apk/debug
        echo "Mock APK for testing" > test-app/android/app/build/outputs/apk/debug/app-debug.apk
        
    - name: Setup test environment
      run: |
        cp .env.example .env
        sed -i 's/REACT_NATIVE_PATH=/REACT_NATIVE_PATH=test-app/' .env
        sed -i 's/ANDROID_DEVICE_NAME=/ANDROID_DEVICE_NAME=test/' .env
        sed -i 's/ANDROID_PLATFORM_VERSION=/ANDROID_PLATFORM_VERSION=29/' .env
        sed -i 's/BUNDLE_ID=/BUNDLE_ID=com.test.app/' .env
        sed -i 's/USER_USERNAME=/USER_USERNAME=test@example.com/' .env
        sed -i 's/USER_PASSWORD=/USER_PASSWORD=testpass123/' .env
        
    - name: Run setup validation
      run: npm run setup:validate || true
      
    # Note: Actual test execution would require a real React Native app
    # This is a placeholder for demonstration
    - name: Run tests (dry run)
      run: |
        echo "Tests would run here with: npm run android"
        echo "Skipping actual test execution as no real app is available"

  test-ios:
    name: iOS Tests
    runs-on: macos-latest
    needs: lint-and-format
    if: false  # Disabled by default - enable when needed
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Appium
      run: npm install -g appium
      
    - name: Install Appium drivers
      run: |
        appium driver install xcuitest
        appium driver list --installed
        
    - name: List iOS Simulators
      run: xcrun simctl list devices
      
    - name: Setup test environment
      run: |
        cp .env.example .env
        sed -i '' 's/REACT_NATIVE_PATH=/REACT_NATIVE_PATH=test-app/' .env
        sed -i '' 's/IOS_DEVICE_NAME=/IOS_DEVICE_NAME=iPhone 14/' .env
        sed -i '' 's/IOS_PLATFORM_VERSION=/IOS_PLATFORM_VERSION=16.0/' .env
        sed -i '' 's/BUNDLE_ID=/BUNDLE_ID=com.test.app/' .env
        sed -i '' 's/USER_USERNAME=/USER_USERNAME=test@example.com/' .env
        sed -i '' 's/USER_PASSWORD=/USER_PASSWORD=testpass123/' .env
        
    - name: Run setup validation
      run: npm run setup:validate || true
      
    # Note: Actual test execution would require a real React Native app
    - name: Run tests (dry run)
      run: |
        echo "Tests would run here with: npm run ios"
        echo "Skipping actual test execution as no real app is available"

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Run security audit
      run: npm audit --audit-level=high
      
    - name: Check for vulnerabilities
      run: npm audit --audit-level=moderate --dry-run